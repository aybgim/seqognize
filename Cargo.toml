[workspace]
members = [
    "seqognize-cli",
    "seqognize-web",
]

[package]
name = "seqognize"
version = "0.1.0"
authors = ["Albert Gevorgyan <ablertus@yahoo.com>"]
edition = "2021"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
array2d = "0.2.1"
delegate = "0.4.3"
ndarray = "0.10.2"
clap = "2.33.3"

[dev-dependencies]
criterion = "0.3.3"

[[bench]]
name = "nt_alignment"
harness = false
